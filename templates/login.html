<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ app_name }} - Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#0b3d2e;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#222;
}

.card{
  background:white;
  width:420px;
  padding:40px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.brand{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:30px;
}

.logo{
  width:60px;
  height:60px;
  border-radius:14px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b3d2e;
  color:white;
  font-weight:700;
  font-size:20px;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.eyebrow{
  font-size:12px;
  color:#777;
  letter-spacing:1px;
}

h1{
  margin:4px 0 0;
  font-size:26px;
}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#0b3d2e;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#0f5b43;
}

.alert{
  padding:10px;
  background:#ffd9d9;
  border-radius:6px;
  margin-bottom:15px;
  color:#900;
}

</style>
</head>

<body>

<div class="card">

  <div class="brand">

    <div class="logo">
      {% if logo_url %}
        <img src="{{ logo_url }}" alt="logo">
      {% else %}
        SA
      {% endif %}
    </div>

    <div>
      <div class="eyebrow">Farm System</div>
      <h1>{{ app_name }}</h1>
    </div>

  </div>


  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}


  <form method="POST">

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>

  </form>

</div>

</body>
</html>
